name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v2
        with:
          node-version: 20.x

      - name: Install and test
        run: |
          yarn --frozen-lockfile
          yarn test
          yarn build

      - id: "auth"
        uses: "google-github-actions/auth@v3"
        with:
          credentials_json: ${{ secrets.GCP_SA_DEV_KEY }}
          service_account: "gcp-sa-dev-key@excalidraw-json-dev.iam.gserviceaccount.com"

      - id: "deploy"
        uses: "google-github-actions/deploy-appengine@v3"
        with:
          deliverables: app.yaml
          project_id: excalidraw-json-dev
          promote: true
